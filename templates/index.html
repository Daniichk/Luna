<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna | Intelligence in Flow</title>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e94560;
            --secondary: #950740;
            --bg: #0f3460;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #1a1a2e;
            background-image: radial-gradient(circle at top right, #16213e, #1a1a2e);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Side Dashboard */
        .sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3); }

        /* Calendar Main Area */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #calendar {
            background: var(--glass);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Calendar Theme Overrides */
        .fc { --fc-border-color: rgba(255,255,255,0.05); }
        .fc-toolbar-title { font-weight: 300 !important; }
        .fc-button-primary { background-color: var(--primary) !important; border: none !important; }
        .luna-event { 
            background: linear-gradient(45deg, var(--primary), var(--secondary)) !important;
            border: none !important;
            padding: 4px 8px !important;
            border-radius: 4px !important;
            font-size: 0.85em !important;
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.2);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">LUNA.AI</div>
        <p style="color: #666; font-size: 14px;">Personalized biorhythm synchronization for high-performance planning.</p>
        
        <div class="input-group">
            <label>Last Period Start</label>
            <input type="date" id="periodStart" value="2026-05-10">
        </div>

        <div class="input-group">
            <label>Average Cycle (Days)</label>
            <input type="number" id="cycleLength" value="28">
        </div>

        <button onclick="updateCalendar()">Sync Biorhythms</button>
        
        <div style="margin-top: auto; font-size: 10px; color: #444;">
            &copy; 2026 LUNA SYSTEMS. ALL RIGHTS RESERVED.
        </div>
    </div>

    <div class="main-content">
        <div id='calendar'></div>
    </div>

    <script>
        var calendar;

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,dayGridWeek'
                },
                events: [],
                height: 'auto'
            });
            calendar.render();
            updateCalendar(); // Initial load
        });

        function updateCalendar() {
            var start = document.getElementById('periodStart').value;
            var cycle = parseInt(document.getElementById('cycleLength').value);
            
            if (!start) return;

            var eventsList = [];
            var baseDate = new Date(start);

            // Generate 12 months of data for a "Pro" feel
            for (var i = 0; i < 12; i++) {
                var eventStart = new Date(baseDate);
                eventStart.setDate(baseDate.getDate() + (i * cycle));
                
                var eventEnd = new Date(eventStart);
                eventEnd.setDate(eventStart.getDate() + 5);

                eventsList.push({
                    title: '🌙 Luna: Low Energy',
                    start: eventStart.toISOString().split('T')[0],
                    end: eventEnd.toISOString().split('T')[0],
                    className: 'luna-event'
                });
            }

            calendar.removeAllEvents();
            calendar.addEventSource(eventsList);
        }
    </script>
</body>
</html>
