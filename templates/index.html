<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA | High-Performance Calendar</title>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #e94560; --bg: #0f3460; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        .sidebar {
            width: 300px; background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1); padding: 30px 20px;
            display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }

        .main { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; }
        #calendar { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; height: 100%; }

        .logo { font-size: 24px; font-weight: 600; letter-spacing: 3px; color: var(--primary); }
        .status-badge { font-size: 10px; background: #222; padding: 5px 10px; border-radius: 20px; border: 1px solid #444; }

        input, button { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: #222; color: white; font-size: 14px; box-sizing: border-box;
        }
        button { background: var(--primary); border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-sec { background: #333; margin-top: 5px; }

        /* Кастомизация календаря под "про" стиль */
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid #222 !important; }
        .fc-day-today { background: rgba(233, 69, 96, 0.05) !important; } /* Подсветка сегодня */
        .luna-event { background: var(--primary) !important; border: none !important; font-size: 11px; }
        .fc-header-toolbar { margin-bottom: 20px !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">LUNA CORE</div>
    <div class="status-badge" id="currentDayDisplay">Today: Loading...</div>
    
    <div style="margin-top: 10px;">
        <label style="font-size: 10px; color: #666;">LAST CYCLE START</label>
        <input type="date" id="dateStart" value="2026-05-10">
    </div>

    <button onclick="updateLuna()">Calculate Cycles</button>

    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

    <div>
        <label style="font-size: 10px; color: #666;">GOOGLE CALENDAR LINK</label>
        <input type="text" id="gUrl" placeholder="Paste iCal URL...">
    </div>
    <button class="btn-sec" id="gBtn" onclick="importGoogle()">Sync Google Tasks</button>
    <button class="btn-sec" onclick="copyExport()">Export to Google</button>
</div>

<div class="main">
    <div id='calendar'></div>
</div>

<script>
    let calendar;

    document.addEventListener('DOMContentLoaded', function() {
        // Выводим текущую дату в сайдбар
        const now = new Date();
        document.getElementById('currentDayDisplay').innerText = "Today: " + now.toDateString();

        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek' // Переключатель месяц/неделя
            },
            firstDay: 1,
            nowIndicator: true, // Красная линия на текущем времени в режиме недели
            events: [],
            locale: 'en'
        });
        calendar.render();
        updateLuna();
    });

    function updateLuna() {
        const start = document.getElementById('dateStart').value;
        if (!start) return;
        
        const events = [];
        let base = new Date(start);
        for (let i = 0; i < 12; i++) {
            let d = new Date(base);
            d.setDate(base.getDate() + (i * 28));
            let end = new Date(d);
            end.setDate(d.getDate() + 5);

            events.push({
                title: '🌙 Luna: Low Energy',
                start: d.toISOString().split('T')[0],
                end: end.toISOString().split('T')[0],
                className: 'luna-event'
            });
        }
        const oldSrc = calendar.getEventSourceById('luna');
        if (oldSrc) oldSrc.remove();
        calendar.addEventSource({ id: 'luna', events: events });
    }

    async function importGoogle() {
        const url = document.getElementById('gUrl').value;
        if (!url) return alert("Paste link first");
        
        const btn = document.getElementById('gBtn');
        btn.innerText = "Syncing...";

        try {
            const res = await fetch(`/fetch_google_events?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if (data.events) {
                const old = calendar.getEventSourceById('google');
                if (old) old.remove();
                calendar.addEventSource({ id: 'google', events: data.events });
                alert("Imported " + data.events.length + " events!");
            }
        } catch (e) { alert("Error: " + e); }
        btn.innerText = "Sync Google Tasks";
    }

    function copyExport() {
        const start = document.getElementById('dateStart').value;
        const link = window.location.origin + `/generate_ics?start=${start}&cycle=28`;
        prompt("Copy this to Google Calendar (Add by URL):", link);
    }
</script>

</body>
</html>
